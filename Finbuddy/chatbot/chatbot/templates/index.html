<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinBuddy - Your Personal Finance Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .hero {
            text-align: center;
            color: white;
            margin-bottom: 3rem;
        }
        .hero h1 {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .hero p {
            font-size: 1.3rem;
        }
        .btn-custom {
            padding: 12px 30px;
            font-size: 1.1rem;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>FinBuddy</h1>
            <p>Your Personal Finance Assistant</p>
            <p class="lead">Get intelligent financial advice, track your budget, and achieve your financial goals.</p>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <a href="/login" class="btn btn-light btn-custom">Login</a>
                <a href="/register" class="btn btn-outline-light btn-custom">Register</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
